<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手势控制颗粒圣诞树</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="scene-panel">
        <canvas id="treeCanvas" aria-label="粒子圣诞树"></canvas>
      </section>

      <aside class="control-panel">
        <h1>手势控制颗粒圣诞树</h1>
        <p>
          允许摄像头权限后，张开或并拢拇指与食指，树会随着手指间距实时放大/缩小。
        </p>

        <div class="status-row">
          <span>状态：</span>
          <strong id="statusText">等待初始化...</strong>
        </div>
        <div class="status-row">
          <span>当前缩放：</span>
          <strong id="scaleText">1.00x</strong>
        </div>

        <video id="inputVideo" autoplay playsinline muted></video>
        <p class="tips">
          提示：把手放在光线充足区域，保证拇指和食指都在画面里。
        </p>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="script.js"></script>
  </body>
</html>
